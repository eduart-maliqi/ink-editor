<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Ink Editor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="toolbar-left">
        <span class="logo">Ink</span>
        <button class="toolbar-btn" id="openFile" title="Open File (Ctrl+O)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        </button>
        <button class="toolbar-btn" id="openFolder" title="Open Folder (Ctrl+Shift+O)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="toolbar-btn" id="saveFile" title="Save (Ctrl+S)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        </button>
        <div class="toolbar-separator"></div>
        <div class="tabs" id="tabs"></div>
        <button class="tab-add" id="addTab" title="New Tab (Ctrl+N)">+</button>
      </div>
      <div class="toolbar-right">
        <button class="toolbar-btn compile-btn" id="compileJava" title="Compile & Run Java (F5)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span class="btn-label">Run</span>
        </button>
        <button class="toolbar-btn" id="toggleTerminal" title="Toggle Terminal (Ctrl+`)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        </button>
        <button class="toolbar-btn" id="toggleFind" title="Find & Replace (Ctrl+H)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <button class="toolbar-btn" id="toggleTheme" title="Toggle Theme">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <span class="status" id="status"></span>
      </div>
    </header>

    <div class="find-bar hidden" id="findBar">
      <input type="text" id="findInput" placeholder="Find..." spellcheck="false">
      <input type="text" id="replaceInput" placeholder="Replace..." spellcheck="false">
      <button class="find-btn" id="findPrev" title="Previous">&#9650;</button>
      <button class="find-btn" id="findNext" title="Next">&#9660;</button>
      <button class="find-btn" id="replaceOne">Replace</button>
      <button class="find-btn" id="replaceAll">Replace All</button>
      <span class="find-count" id="findCount"></span>
      <button class="find-close" id="closeFind">&times;</button>
    </div>

    <div class="main-area">
      <aside class="sidebar hidden" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title" id="sidebarTitle">Explorer</span>
          <button class="sidebar-close" id="closeSidebar">&times;</button>
        </div>
        <div class="file-tree" id="fileTree"></div>
      </aside>

      <div class="editor-wrapper">
        <main class="editor-container">
          <div class="gutter" id="gutter"></div>
          <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        </main>

        <div class="terminal-panel hidden" id="terminalPanel">
          <div class="terminal-header">
            <div class="terminal-tabs">
              <span class="terminal-tab active">Output</span>
            </div>
            <div class="terminal-actions">
              <button class="terminal-action" id="clearTerminal" title="Clear">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
              <button class="terminal-action" id="closeTerminal" title="Close">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
            </div>
          </div>
          <div class="terminal-resize" id="terminalResize"></div>
          <pre class="terminal-output" id="terminalOutput"></pre>
        </div>
      </div>
    </div>

    <footer class="statusbar">
      <span id="cursorPos">Ln 1, Col 1</span>
      <span id="fileLanguage">Plain Text</span>
      <span id="javaStatus"></span>
      <span id="wordCount">0 words, 0 chars</span>
      <span id="encoding">UTF-8</span>
    </footer>
  </div>

  <script src="js/editor.js"></script>
</body>
</html>
